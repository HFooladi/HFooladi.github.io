name: Build Jekyll site

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Gemfile.lock is generated on Windows and lists `wdm` (a Windows-only
      # gem). On Linux runners the gem is excluded by `if Gem.win_platform?`
      # in the Gemfile, so bundler in frozen mode refuses to reconcile.
      BUNDLE_FROZEN: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build --config _config.yml,_config.dev.yml --trace
        env:
          JEKYLL_ENV: production
